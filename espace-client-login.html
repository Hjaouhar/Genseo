<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Acces Espace Client — Hamid Jaouhar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #5B7B7A; --primary-light: #7A9E9D; --primary-dark: #3D5655;
            --accent: #C9A87C; --accent-light: #E0CBA8;
            --text-dark: #2C3E50; --text-medium: #5A6B7A;
            --bg-cream: #FAF8F5; --bg-light: #F5F2ED; --bg-white: #FFFFFF;
        }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background: var(--bg-cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { max-width: 420px; width: 100%; padding: 20px; }
        .login-card { background: white; border-radius: 20px; padding: 50px 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; border-top: 4px solid var(--accent); }
        .lock-icon { width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .lock-icon svg { width: 32px; height: 32px; }
        .login-card h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--primary-dark); margin-bottom: 10px; }
        .login-card > p { color: var(--text-medium); font-size: 14px; margin-bottom: 35px; line-height: 1.6; }
        .pin-display { margin-bottom: 30px; }
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #E8E4DF; background: transparent; transition: all 0.2s; }
        .pin-dot.filled { background: var(--primary); border-color: var(--primary); }
        .pin-dot.error { background: #E74C3C; border-color: #E74C3C; animation: shake 0.5s; }
        .pin-dot.success { background: #27AE60; border-color: #27AE60; }
        .pin-label { font-size: 13px; color: var(--text-medium); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 280px; margin: 0 auto 25px; }
        .key { width: 80px; height: 60px; border: none; border-radius: 12px; background: var(--bg-cream); font-size: 24px; font-weight: 600; color: var(--text-dark); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .key:hover { background: var(--bg-light); }
        .key:active { transform: scale(0.95); }
        .key.empty { background: transparent; cursor: default; }
        .key.delete { background: var(--bg-light); color: var(--text-medium); font-size: 18px; }
        .key.submit { background: var(--primary); color: white; }
        .key.submit:hover { background: var(--primary-dark); }
        .key.submit:disabled { opacity: 0.4; cursor: not-allowed; }
        .error-msg { color: #E74C3C; font-size: 13px; margin-top: 15px; min-height: 20px; }
        .attempts-left { font-size: 12px; color: var(--text-light); margin-top: 10px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--primary); font-size: 14px; margin-top: 20px; text-decoration: none; }
        .back-link:hover { color: var(--primary-dark); }
        .help-text { font-size: 12px; color: var(--text-light); margin-top: 20px; line-height: 1.6; }
        .help-text a { color: var(--primary); }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; z-index: 10; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--bg-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        .loading-text { font-size: 14px; color: var(--text-medium); }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        @media (max-width: 480px) {
            .login-card { padding: 40px 25px; }
            .key { width: 70px; height: 55px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="position: relative;">
            <!-- Loading overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <p class="loading-text">Chargement de l'espace client...</p>
            </div>

            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h1>Espace Client</h1>
            <p>Entrez votre code d'accès à 6 chiffres pour accéder à votre espace thérapeutique personnalisé sur <strong>therapeute-casablanca.maroc</strong>.</p>

            <div class="pin-display">
                <div class="pin-dots">
                    <div class="pin-dot" id="dot0"></div>
                    <div class="pin-dot" id="dot1"></div>
                    <div class="pin-dot" id="dot2"></div>
                    <div class="pin-dot" id="dot3"></div>
                    <div class="pin-dot" id="dot4"></div>
                    <div class="pin-dot" id="dot5"></div>
                </div>
                <p class="pin-label">Code à 6 chiffres</p>
            </div>

            <div class="keypad">
                <button class="key" onclick="addDigit('1')">1</button>
                <button class="key" onclick="addDigit('2')">2</button>
                <button class="key" onclick="addDigit('3')">3</button>
                <button class="key" onclick="addDigit('4')">4</button>
                <button class="key" onclick="addDigit('5')">5</button>
                <button class="key" onclick="addDigit('6')">6</button>
                <button class="key" onclick="addDigit('7')">7</button>
                <button class="key" onclick="addDigit('8')">8</button>
                <button class="key" onclick="addDigit('9')">9</button>
                <button class="key delete" onclick="deleteDigit()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                </button>
                <button class="key" onclick="addDigit('0')">0</button>
                <button class="key submit" id="submitBtn" onclick="submitPin()" disabled>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>

            <p class="error-msg" id="errorMsg"></p>
            <p class="attempts-left" id="attemptsMsg"></p>

            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Retour au site
            </a>

            <p class="help-text">
                Vous n'avez pas reçu votre code ?<br>
                Contactez Hamid Jaouhar à <a href="mailto:h.jaouhar@gmail.com">h.jaouhar@gmail.com</a>
            </p>
        </div>
    </div>

    <script>
        // =============================================
        // PIN CODE SYSTEM - Google Sheets Integration
        // =============================================

        // Google Sheet published CSV URL
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1d_ivdaqOiHC-rkDjsfJ3w-Lxqsm5Zouu8f2F_0zOLbc/export?format=csv';

        let validPins = new Set();
        let currentPin = '';
        let attempts = 0;
        let lockedUntil = null;
        let isLoading = true;

        const MAX_ATTEMPTS = 5;
        const LOCKOUT_MINUTES = 15;

        // Fetch PIN codes from Google Sheet
        async function fetchValidPins() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Failed to fetch');
                const csvText = await response.text();
                parseCSV(csvText);
                console.log('Loaded ' + validPins.size + ' valid PIN codes');
            } catch (error) {
                console.error('Error fetching PINs:', error);
                document.getElementById('loadingOverlay').innerHTML =
                    '<div style="text-align:center;padding:40px;">' +
                    '<p style="color:#E74C3C;font-size:16px;margin-bottom:15px;">Erreur de chargement</p>' +
                    '<p style="color:#5A6B7A;font-size:14px;">Impossible de charger les codes d\'accès.</p>' +
                    '<p style="color:#5A6B7A;font-size:14px;margin-top:10px;">Veuillez recharger la page.</p>' +
                    '<button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#5B7B7A;color:white;border:none;border-radius:20px;cursor:pointer;">Recharger</button>' +
                    '</div>';
                return;
            }
            isLoading = false;
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Parse CSV: columns are Nom, Code, Email (or just data without headers)
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            // Read ALL rows - don't skip header in case there isn't one
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                // Parse CSV line (handle commas in quotes)
                const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 2) {
                    const code = cols[1]; // Code is column B (index 1)
                    if (code && /^\d{6}$/.test(code)) {
                        validPins.add(code);
                    }
                }
            }
        }

        // Check if locked out
        function checkLockout() {
            const stored = localStorage.getItem('hj_lockout');
            if (stored) {
                const until = parseInt(stored);
                if (Date.now() < until) {
                    lockedUntil = until;
                    const remaining = Math.ceil((until - Date.now()) / 60000);
                    showLockedMessage(remaining);
                    return true;
                } else {
                    localStorage.removeItem('hj_lockout');
                    attempts = 0;
                }
            }
            return false;
        }

        function showLockedMessage(minutes) {
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('attemptsMsg').innerHTML =
                '<span style="color:#E74C3C;">Trop de tentatives. Réessayez dans <strong>' + minutes + ' min</strong>.</span>';
            document.querySelectorAll('.key').forEach(k => k.disabled = true);
        }

        function addDigit(d) {
            if (isLoading || checkLockout()) return;
            if (currentPin.length >= 6) return;
            currentPin += d;
            updateDots();
            if (currentPin.length === 6) {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function deleteDigit() {
            if (isLoading || checkLockout()) return;
            if (currentPin.length === 0) return;
            currentPin = currentPin.slice(0, -1);
            updateDots();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('errorMsg').textContent = '';
        }

        function updateDots() {
            for (let i = 0; i < 6; i++) {
                const dot = document.getElementById('dot' + i);
                dot.className = 'pin-dot' + (i < currentPin.length ? ' filled' : '');
            }
        }

        function submitPin() {
            if (currentPin.length !== 6 || isLoading) return;

            const isValid = validPins.has(currentPin);

            if (isValid) {
                // Success - store session and redirect
                document.querySelectorAll('.pin-dot').forEach(d => {
                    d.className = 'pin-dot success';
                });
                sessionStorage.setItem('hj_client_auth', 'true');
                sessionStorage.setItem('hj_client_time', Date.now().toString());

                setTimeout(() => {
                    window.location.href = 'espace-client.html';
                }, 600);
            } else {
                // Failed
                attempts++;
                document.querySelectorAll('.pin-dot').forEach(d => {
                    d.className = 'pin-dot error';
                });

                if (attempts >= MAX_ATTEMPTS) {
                    const lockoutTime = Date.now() + (LOCKOUT_MINUTES * 60 * 1000);
                    localStorage.setItem('hj_lockout', lockoutTime.toString());
                    showLockedMessage(LOCKOUT_MINUTES);
                } else {
                    const remaining = MAX_ATTEMPTS - attempts;
                    document.getElementById('attemptsMsg').textContent =
                        'Code incorrect. ' + remaining + ' tentative' + (remaining > 1 ? 's' : '') + ' restante' + (remaining > 1 ? 's' : '') + '.';
                }

                setTimeout(() => {
                    currentPin = '';
                    updateDots();
                    document.getElementById('submitBtn').disabled = true;
                }, 800);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            if (isLoading || checkLockout()) return;
            if (e.key >= '0' && e.key <= '9') addDigit(e.key);
            else if (e.key === 'Backspace') deleteDigit();
            else if (e.key === 'Enter' && currentPin.length === 6) submitPin();
        });

        // Check existing session
        if (sessionStorage.getItem('hj_client_auth') === 'true') {
            const authTime = parseInt(sessionStorage.getItem('hj_client_time') || '0');
            // Session valid for 2 hours
            if (Date.now() - authTime < 2 * 60 * 60 * 1000) {
                window.location.href = 'espace-client.html';
            }
        }

        // Init - fetch PINs on load
        fetchValidPins();
    </script>
</body>
</html>
